name: Fuzz

on:
  schedule:
    # Nightly at 03:17 UTC (odd minute to avoid the on-the-hour thundering herd)
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzParseReadResponse
          - FuzzParseBMSInfo
          - FuzzParseDeviceInfo
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Fuzz
        run: go test -run='^$' -fuzz='^${{ matrix.target }}$' -fuzztime=10m ./internal/protocol

      - name: Upload crashing inputs
        # A crash writes the failing input to testdata/fuzz/<target>/; commit
        # it as a permanent regression seed after fixing the bug.
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashers-${{ matrix.target }}
          path: internal/protocol/testdata/fuzz/
          if-no-files-found: ignore
